<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Página não encontrada</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-gradient-to-b from-slate-50 to-white text-slate-900">
    <main class="mx-auto flex min-h-screen max-w-3xl flex-col items-center justify-center px-6 py-12">
      <div class="flex w-full flex-col items-center text-center">
        <div class="mb-5 flex h-14 w-14 items-center justify-center rounded-2xl bg-indigo-600 text-white shadow">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 7a2 2 0 0 1 2-2h8l6 6v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <path d="M13 5v6h6"></path>
            <path d="M9.5 14.5h5"></path>
            <path d="M10 17h4"></path>
          </svg>
        </div>

        <p class="text-sm font-medium text-indigo-700">Erro 404</p>
        <h1 class="mt-2 text-3xl font-semibold tracking-tight sm:text-4xl">Página não encontrada</h1>
        <p class="mt-3 max-w-prose text-base leading-relaxed text-slate-600">
          O endereço acessado não existe ou foi movido.
        </p>

        <div class="mt-8 flex flex-col gap-3 sm:flex-row">
          <a href="/" class="inline-flex items-center justify-center rounded-lg bg-indigo-600 px-5 py-3 text-sm font-semibold text-white shadow hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            Voltar para o início
          </a>
          <a href="/convert/pdf-to-word" class="inline-flex items-center justify-center rounded-lg border border-slate-200 bg-white px-5 py-3 text-sm font-semibold text-slate-700 shadow-sm hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            Ver endpoint exemplo
          </a>
        </div>
      </div>

      <div class="mt-10 w-full rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
        <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
          <div>
            <p class="text-sm font-semibold text-slate-900">Dica</p>
            <p class="mt-1 text-sm text-slate-600">
              Se você está tentando usar a API, confirme a rota e o método HTTP. Para conversões, use <span class="font-mono text-slate-800">/convert/...</span>.
            </p>
          </div>
          <div class="rounded-lg bg-slate-50 px-4 py-3 text-left text-xs text-slate-600">
            <div><span class="font-semibold text-slate-700">UI</span>: <span class="font-mono">/</span></div>
            <div><span class="font-semibold text-slate-700">API</span>: <span class="font-mono">/convert</span></div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
