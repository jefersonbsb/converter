<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conversor de Arquivos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-slate-50 to-slate-200 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-xl bg-white rounded-2xl shadow-xl p-8 space-y-6">

        <!-- Header -->
        <div class="text-center">
            <div class="mx-auto w-14 h-14 bg-indigo-100 rounded-xl flex items-center justify-center mb-3">
                <svg class="w-7 h-7 text-indigo-600" fill="none" stroke="currentColor" stroke-width="2"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6h.1a5 5 0 011 9.9M9 19l3 3m0 0l3-3m-3 3V10" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Conversor de Arquivos</h1>
            <p class="text-sm text-gray-500 mt-1">Converta seus documentos de forma rápida e segura</p>
        </div>

        <!-- Form -->
        <form id="convertForm" class="space-y-5">

            <!-- Conversion Category -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Categoria</label>
                <select id="categorySelect" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-gray-700 bg-white
                               focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                    <option value="office">📄 Documentos Office</option>
                    <option value="pdf">📕 PDF</option>
                    <option value="image">🖼️ Imagens</option>
                    <option value="ebook">📚 E-books & Web</option>
                </select>
            </div>

            <!-- Conversion Type -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Tipo de Conversão</label>
                <select id="conversionType" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-gray-700 bg-white
                               focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                    <!-- populated by JS -->
                </select>
            </div>

            <!-- Extra options (hidden by default) -->
            <div id="extraOptions" class="hidden space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Formato de saída</label>
                    <select id="imageFormatSelect" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-gray-700 bg-white
                                   focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                        <option value="png">PNG</option>
                        <option value="jpg">JPG</option>
                        <option value="webp">WebP</option>
                        <option value="bmp">BMP</option>
                        <option value="tiff">TIFF</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Resolução (DPI)</label>
                    <input type="number" id="dpiInput" value="150" min="72" max="600"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-gray-700
                                   focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" />
                </div>
                <div id="ocrToggle" class="hidden">
                    <label class="flex items-center gap-2 text-sm font-medium text-gray-700">
                        <input type="checkbox" id="ocrCheckbox" class="h-4 w-4" />
                        Usar OCR (para PDF escaneado)
                    </label>
                </div>
                <div id="ocrLangWrap" class="hidden">
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Idioma do OCR</label>
                    <input type="text" id="ocrLangInput" value="por"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-gray-700
                                   focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" />
                </div>
            </div>

            <!-- File Upload -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Selecione o Arquivo</label>
                <div id="dropZone" class="relative border-2 border-dashed border-gray-300 rounded-lg p-6 text-center
                            hover:border-indigo-400 transition cursor-pointer bg-gray-50 hover:bg-indigo-50/30">

                    <input type="file" id="fileInput" class="absolute inset-0 opacity-0 cursor-pointer" />

                    <svg class="mx-auto w-10 h-10 text-gray-400 mb-2" fill="none" stroke="currentColor"
                        stroke-width="1.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
                    </svg>

                    <p id="fileLabel" class="text-sm text-gray-500">
                        <span class="font-medium text-indigo-600">Clique para escolher</span> ou arraste o arquivo
                    </p>
                    <p id="fileExtHint" class="text-xs text-gray-400 mt-1">Formatos aceitos: veja a descrição da
                        conversão</p>
                    <p id="fileName" class="text-xs text-gray-400 mt-1 hidden"></p>
                </div>
            </div>

            <!-- Submit -->
            <button type="submit" id="submitBtn" class="w-full flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700
                           text-white font-semibold py-3 px-4 rounded-lg transition disabled:opacity-50
                           disabled:cursor-not-allowed">
                <svg id="spinner" class="hidden animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z" />
                </svg>
                <span id="btnText">Converter e Baixar</span>
            </button>
        </form>

        <!-- Status / Error -->
        <div id="statusMessage" class="hidden text-sm text-center rounded-lg p-3"></div>

        <!-- Footer -->
        <p class="text-xs text-center text-gray-400">Os arquivos são processados sob demanda e excluídos
            automaticamente.</p>
    </div>

    <script>
        // ── Conversion definitions ──────────────────────────────────────
        const conversions = {
            // Office category
            'office-to-pdf': {
                category: 'office',
                label: 'Office → PDF',
                accept: '.doc,.docx,.odt,.rtf,.xls,.xlsx,.ppt,.pptx,.html,.htm,.epub',
                hint: 'DOC, DOCX, ODT, RTF, XLS, XLSX, PPT, PPTX, HTML, EPUB',
                endpoint: '/convert/office-to-pdf',
                extra: false,
            },
            'word-to-pdf': {
                category: 'office',
                label: 'Word → PDF',
                accept: '.doc,.docx,.odt,.rtf',
                hint: 'DOC, DOCX, ODT, RTF',
                endpoint: '/convert/word-to-pdf',
                extra: false,
            },
            'word-to-html': {
                category: 'office',
                label: 'Word → HTML',
                accept: '.doc,.docx,.odt,.rtf',
                hint: 'DOC, DOCX, ODT, RTF',
                endpoint: '/convert/word-to-html',
                extra: false,
            },
            'excel-to-csv': {
                category: 'office',
                label: 'Excel → CSV',
                accept: '.xls,.xlsx',
                hint: 'XLS, XLSX',
                endpoint: '/convert/excel-to-csv',
                extra: false,
            },
            'powerpoint-to-pdf': {
                category: 'office',
                label: 'PowerPoint → PDF',
                accept: '.ppt,.pptx',
                hint: 'PPT, PPTX',
                endpoint: '/convert/powerpoint-to-pdf',
                extra: false,
            },
            // PDF category
            'pdf-to-word': {
                category: 'pdf',
                label: 'PDF → Word (DOCX)',
                accept: '.pdf',
                hint: 'PDF',
                endpoint: '/convert/pdf-to-word',
                extra: 'pdf-to-word',
            },
            'pdf-to-image': {
                category: 'pdf',
                label: 'PDF → Imagem',
                accept: '.pdf',
                hint: 'PDF (cada página vira PNG/JPG)',
                endpoint: '/convert/pdf-to-image',
                extra: 'pdf-to-image',
            },
            'image-to-pdf': {
                category: 'pdf',
                label: 'Imagem → PDF',
                accept: '.jpg,.jpeg,.png',
                hint: 'JPG, JPEG, PNG',
                endpoint: '/convert/image-to-pdf',
                extra: false,
            },
            // Image category
            'image-convert': {
                category: 'image',
                label: 'Converter formato (JPG ⇄ PNG ⇄ WebP ⇄ BMP ⇄ TIFF)',
                accept: '.jpg,.jpeg,.png,.webp,.bmp,.tiff,.tif',
                hint: 'JPG, PNG, WebP, BMP, TIFF',
                endpoint: '/convert/image',
                extra: 'image-convert',
            },
            // E-books & Web category
            'epub-to-pdf': {
                category: 'ebook',
                label: 'EPUB → PDF',
                accept: '.epub',
                hint: 'EPUB',
                endpoint: '/convert/epub-to-pdf',
                extra: false,
            },
            'html-to-pdf': {
                category: 'ebook',
                label: 'HTML → PDF',
                accept: '.html,.htm',
                hint: 'HTML, HTM',
                endpoint: '/convert/html-to-pdf',
                extra: false,
            },
        };

        // ── DOM refs ────────────────────────────────────────────────────
        const form = document.getElementById('convertForm');
        const categorySelect = document.getElementById('categorySelect');
        const conversionType = document.getElementById('conversionType');
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const fileExtHint = document.getElementById('fileExtHint');
        const fileLabel = document.getElementById('fileLabel');
        const dropZone = document.getElementById('dropZone');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('spinner');
        const statusMessage = document.getElementById('statusMessage');
        const extraOptions = document.getElementById('extraOptions');
        const imageFormatSelect = document.getElementById('imageFormatSelect');
        const dpiInput = document.getElementById('dpiInput');
        const ocrToggle = document.getElementById('ocrToggle');
        const ocrCheckbox = document.getElementById('ocrCheckbox');
        const ocrLangWrap = document.getElementById('ocrLangWrap');
        const ocrLangInput = document.getElementById('ocrLangInput');

        // ── Populate conversion types based on category ────────────────
        const categoryMap = {};
        for (const [key, def] of Object.entries(conversions)) {
            if (!categoryMap[def.category]) categoryMap[def.category] = [];
            categoryMap[def.category].push({ key, ...def });
        }

        function updateConversionTypes() {
            const cat = categorySelect.value;
            const items = categoryMap[cat] || [];
            conversionType.innerHTML = '';
            items.forEach(item => {
                const opt = document.createElement('option');
                opt.value = item.key;
                opt.textContent = item.label;
                conversionType.appendChild(opt);
            });
            updateFileAccept();
            updateExtraOptions();
        }

        function updateFileAccept() {
            const key = conversionType.value;
            const def = conversions[key];
            if (def) {
                fileInput.accept = def.accept;
                fileExtHint.textContent = `Formatos aceitos: ${def.hint}`;
            }
            // Reset file display
            fileInput.value = '';
            fileName.classList.add('hidden');
            fileLabel.classList.remove('hidden');
        }

        function updateExtraOptions() {
            const key = conversionType.value;
            const def = conversions[key];
            if (def && def.extra === 'pdf-to-image') {
                extraOptions.classList.remove('hidden');
                imageFormatSelect.parentElement.classList.remove('hidden');
                dpiInput.parentElement.classList.remove('hidden');
                ocrToggle.classList.add('hidden');
                ocrLangWrap.classList.add('hidden');
                dpiInput.value = dpiInput.value || '150';
            } else if (def && def.extra === 'image-convert') {
                extraOptions.classList.remove('hidden');
                imageFormatSelect.parentElement.classList.remove('hidden');
                dpiInput.parentElement.classList.add('hidden');
                ocrToggle.classList.add('hidden');
                ocrLangWrap.classList.add('hidden');
            } else if (def && def.extra === 'pdf-to-word') {
                extraOptions.classList.remove('hidden');
                imageFormatSelect.parentElement.classList.add('hidden');
                ocrToggle.classList.remove('hidden');
                ocrLangWrap.classList.toggle('hidden', !ocrCheckbox.checked);
                dpiInput.parentElement.classList.toggle('hidden', !ocrCheckbox.checked);
                if (ocrCheckbox.checked) {
                    dpiInput.value = dpiInput.value || '200';
                }
            } else {
                extraOptions.classList.add('hidden');
            }
        }

        categorySelect.addEventListener('change', updateConversionTypes);
        conversionType.addEventListener('change', () => {
            updateFileAccept();
            updateExtraOptions();
        });

        // Initialize
        updateConversionTypes();
        ocrCheckbox.addEventListener('change', updateExtraOptions);

        // ── File name display ───────────────────────────────────────────
        fileInput.addEventListener('change', () => {
            const f = fileInput.files[0];
            if (f) {
                fileName.textContent = f.name;
                fileName.classList.remove('hidden');
                fileLabel.classList.add('hidden');
            } else {
                fileName.classList.add('hidden');
                fileLabel.classList.remove('hidden');
            }
        });

        // ── Drag & drop visual hint ─────────────────────────────────────
        ['dragenter', 'dragover'].forEach(evt => {
            dropZone.addEventListener(evt, (e) => {
                e.preventDefault();
                dropZone.classList.add('border-indigo-500', 'bg-indigo-50/50');
            });
        });
        ['dragleave', 'drop'].forEach(evt => {
            dropZone.addEventListener(evt, (e) => {
                e.preventDefault();
                dropZone.classList.remove('border-indigo-500', 'bg-indigo-50/50');
            });
        });
        dropZone.addEventListener('drop', (e) => {
            const files = e.dataTransfer.files;
            if (files.length) {
                fileInput.files = files;
                fileName.textContent = files[0].name;
                fileName.classList.remove('hidden');
                fileLabel.classList.add('hidden');
            }
        });

        // ── Submit ──────────────────────────────────────────────────────
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const file = fileInput.files[0];
            if (!file) {
                showStatus('Selecione um arquivo antes de converter.', 'red');
                return;
            }

            const key = conversionType.value;
            const def = conversions[key];
            if (!def) return;

            // Build URL with query params if needed
            let url = def.endpoint;
            const params = new URLSearchParams();

            if (def.extra === 'pdf-to-image') {
                params.set('fmt', imageFormatSelect.value);
                params.set('dpi', dpiInput.value || '150');
            } else if (def.extra === 'image-convert') {
                params.set('to', imageFormatSelect.value);
            } else if (def.extra === 'pdf-to-word') {
                if (ocrCheckbox.checked) {
                    params.set('ocr', 'true');
                    params.set('ocr_lang', ocrLangInput.value || 'por');
                    params.set('ocr_dpi', dpiInput.value || '200');
                }
            }

            const qs = params.toString();
            if (qs) url += '?' + qs;

            // UI loading state
            setLoading(true);
            hideStatus();

            const defaultApiBase = 'http://127.0.0.1:3004';
            const apiFromQuery = new URLSearchParams(location.search).get('api');
            const apiBase = apiFromQuery
                ? apiFromQuery.replace(/\/+$/, '')
                : ((location.protocol === 'http:' || location.protocol === 'https:') && location.port === '3004')
                    ? location.origin
                    : defaultApiBase;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch(apiBase + url, { method: 'POST', body: formData });

                if (!res.ok) {
                    let msg = `Erro ${res.status}`;
                    try {
                        const err = await res.json();
                        msg = err.detail || msg;
                    } catch {
                        try {
                            const text = await res.text();
                            if (text) msg = text.slice(0, 200);
                        } catch { }
                    }
                    throw new Error(msg);
                }

                // Trigger automatic download
                const blob = await res.blob();
                const disposition = res.headers.get('Content-Disposition') || '';
                const filenameStarMatch = disposition.match(/filename\*\s*=\s*UTF-8''([^;\n]+)/i);
                const filenameQuotedMatch = disposition.match(/filename\s*=\s*"([^"\n]+)"/i);
                const filenameBareMatch = disposition.match(/filename\s*=\s*([^;\n]+)/i);

                let serverFilename = '';
                if (filenameStarMatch && filenameStarMatch[1]) {
                    try {
                        serverFilename = decodeURIComponent(filenameStarMatch[1]);
                    } catch {
                        serverFilename = filenameStarMatch[1];
                    }
                } else if (filenameQuotedMatch && filenameQuotedMatch[1]) {
                    serverFilename = filenameQuotedMatch[1];
                } else if (filenameBareMatch && filenameBareMatch[1]) {
                    serverFilename = filenameBareMatch[1].trim().replace(/^"|"$/g, '');
                }

                const mimeToExt = {
                    'application/pdf': 'pdf',
                    'application/zip': 'zip',
                    'text/csv': 'csv',
                    'text/html': 'html',
                    'application/vnd.openxmlformats-officedocument.wordprocessingml.document': 'docx',
                    'image/png': 'png',
                    'image/jpeg': 'jpg',
                    'image/webp': 'webp',
                    'image/bmp': 'bmp',
                    'image/tiff': 'tiff',
                };

                const safeBaseName = (name) =>
                    (name || 'converted')
                        .replace(/\.[^/.]+$/, '')
                        .replace(/[\\/:*?"<>|]/g, '_')
                        .trim() || 'converted';

                const extFromMime = mimeToExt[blob.type] || (blob.type.startsWith('image/') ? blob.type.split('/')[1] : '');
                const defaultFilename = `${safeBaseName(file.name)}.${extFromMime || 'file'}`;
                const filename = serverFilename || defaultFilename;

                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                a.remove();
                URL.revokeObjectURL(a.href);

                showStatus('✅ Conversão concluída! Download iniciado.', 'green');
            } catch (err) {
                showStatus(`❌ ${err.message}`, 'red');
            } finally {
                setLoading(false);
            }
        });

        // ── Helpers ─────────────────────────────────────────────────────
        function setLoading(loading) {
            submitBtn.disabled = loading;
            spinner.classList.toggle('hidden', !loading);
            btnText.textContent = loading ? 'Convertendo…' : 'Converter e Baixar';
        }

        function showStatus(msg, type) {
            statusMessage.textContent = msg;
            statusMessage.className = `text-sm text-center rounded-lg p-3 ${type === 'red'
                ? 'bg-red-50 text-red-700 border border-red-200'
                : 'bg-green-50 text-green-700 border border-green-200'
                }`;
            statusMessage.classList.remove('hidden');
        }

        function hideStatus() {
            statusMessage.classList.add('hidden');
        }
    </script>

</body>

</html>
